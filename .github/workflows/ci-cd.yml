name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'produccion']
  pull_request:
    branches: ['main', 'produccion']

jobs:
  # ---------------------------------------------------------
  # JOB 1: INTEGRACIÓN CONTINUA (CI)
  # Se ejecuta en cada push y PR para asegurar la calidad.
  # ---------------------------------------------------------
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar formato (Prettier)
        run: npm run format:check

      - name: Analizar código (ESLint)
        run: npm run lint

      - name: Verificar tipos (TypeScript)
        run: npm run check

      - name: Compilar proyecto
        run: npm run build

      - name: Ejecutar Tests
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
        run: npm test

  # ---------------------------------------------------------
  # JOB 2: DESPLIEGUE CONTINUO (CD)
  # Solo se ejecuta si el Job de CI pasa correctamente
  # Y si estamos en la rama de 'produccion'.
  # ---------------------------------------------------------
  build-and-push:
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/produccion'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/backend-relevo:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/backend-relevo:${{ github.sha }}
