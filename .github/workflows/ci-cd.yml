name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'produccion']
  pull_request:
    branches: ['main', 'produccion']

jobs:
  # ---------------------------------------------------------
  # JOB 1: CALIDAD DE CÓDIGO
  # ---------------------------------------------------------
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - name: Formato y Lint
        run: |
          npm run format:check
          npm run lint
      - name: Tipos y Build
        run: |
          npm run check
          npm run build

  # ---------------------------------------------------------
  # JOB 2: TESTS (Solo si la calidad es buena)
  # ---------------------------------------------------------
  unit-and-integration-tests:
    needs: quality-check
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - name: Ejecutar Tests
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
        run: npm test

  # ---------------------------------------------------------
  # JOB 3: DESPLIEGUE (Solo en 'produccion' y si los tests pasan)
  # ---------------------------------------------------------
  build-and-push:
    needs: unit-and-integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/produccion'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/backend-relevo:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/backend-relevo:${{ github.sha }}
