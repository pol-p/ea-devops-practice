services:
  app:
    build: .
    image: backend-relevo:latest
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - MONGO_URI=${MONGO_URI:-mongodb://db:27017/relevo-db}
      - PORT=${PORT:-4000}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - db
    networks:
      - backend-network

  db:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network

volumes:
  mongo-data:

networks:
  backend-network:
    driver: bridge
